    <rect x="790" y="104" width="150" height="92" rx="20" fill="#F8FAFC" stroke="#112031" stroke-width="2"/>
    <text x="865" y="145" text-anchor="middle" font-size="22" font-weight="700">Done</text>
    <text x="865" y="172" text-anchor="middle" font-size="16">or Requeue/DLQ</text>
