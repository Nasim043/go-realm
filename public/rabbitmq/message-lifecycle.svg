<svg width="980" height="300" viewBox="0 0 980 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="300" rx="28" fill="#FFFDF7"/>
  <g font-family="Arial" fill="#112031">
    <rect x="40" y="104" width="136" height="92" rx="20" fill="#D8ECFF" stroke="#3A86FF" stroke-width="2"/>
    <text x="108" y="145" text-anchor="middle" font-size="22" font-weight="700">Publish</text>
    <text x="108" y="172" text-anchor="middle" font-size="16">Producer sends</text>

    <rect x="222" y="104" width="136" height="92" rx="20" fill="#FFF4D6" stroke="#E9A820" stroke-width="2"/>
    <text x="290" y="145" text-anchor="middle" font-size="22" font-weight="700">Store</text>
    <text x="290" y="172" text-anchor="middle" font-size="16">Queue keeps it</text>

    <rect x="404" y="104" width="136" height="92" rx="20" fill="#D8F3DC" stroke="#2A9D8F" stroke-width="2"/>
    <text x="472" y="145" text-anchor="middle" font-size="22" font-weight="700">Deliver</text>
    <text x="472" y="172" text-anchor="middle" font-size="16">Consumer gets</text>

